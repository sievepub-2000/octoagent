x-backend-env: &backend-env
  CI: "true"
  PYTHONDONTWRITEBYTECODE: "1"
  OCTO_AGENT_CONFIG_PATH: /app/runtime/config/config.yaml
  OCTO_AGENT_EXTENSIONS_CONFIG_PATH: /app/runtime/config/extensions_config.json
  OCTO_AGENT_SETUP_STATE_FILE: /app/workspace/env/setup.json
  OCTO_AGENT_HOME: /app/workspace
  OCTOAGENT_MANAGED_SECRETS_FILE: /app/runtime/secrets/models.env
  OCTOAGENT_RUNTIME_CONFIG_DIR: /app/backend/runtime
  OCTOAGENT_APP_ROOT: /app
  OCTOAGENT_BACKEND_PATH: /app/backend
  PYTHONPATH: /app/backend
  OCTOAGENT_FILESYSTEM_ROOT: /app
  OCTOAGENT_PYTHON_BIN: /app/backend/.venv/bin/python
  OCTOAGENT_RUNTIME_PROFILE: production
  NPM_CONFIG_CACHE: /app/runtime/tools/npm-cache
  npm_config_cache: /app/runtime/tools/npm-cache
  OCTOAGENT_MCP_TOOLS_DIR: /app/runtime/tools/mcp
  OCTOAGENT_MCP_FILESYSTEM_BIN: /app/runtime/tools/mcp/node_modules/.bin/mcp-server-filesystem
  OCTOAGENT_MCP_POSTGRES_BIN: /app/runtime/tools/mcp/node_modules/.bin/mcp-server-postgres
  OCTOAGENT_MCP_OPENAPI_BIN: /app/runtime/tools/mcp/node_modules/.bin/openapi-mcp-server
  OCTOAGENT_MCP_DOCKER_BIN: /app/runtime/tools/mcp/node_modules/.bin/docker-mcp
  OCTOAGENT_TOOL_GUIDE_PATH: /app/runtime/system_tools/copilot-instructions.md
  OCTOAGENT_POSTGRES_SUPERUSER_DSN: postgresql://octoagent:${POSTGRES_PASSWORD:-octoagent}@postgres:5432/${POSTGRES_DB:-octoagent}
  OCTOAGENT_CHECKPOINTER_DSN: postgresql://octoagent:${POSTGRES_PASSWORD:-octoagent}@postgres:5432/${POSTGRES_DB:-octoagent}?sslmode=disable
  OCTOAGENT_GATEWAY_INTERNAL_URL: http://app-server:${OCTO_APP_SERVER_PORT:-19802}
  OCTOAGENT_GATEWAY_HEALTH_URL: http://app-server:${OCTO_APP_SERVER_PORT:-19802}/health
  OCTOAGENT_OPENAPI_SPEC_URL: http://app-server:${OCTO_APP_SERVER_PORT:-19802}/openapi.json
  OCTO_LANGGRAPH_BASE_URL: http://app-server:${OCTO_APP_SERVER_PORT:-19802}
  OCTOAGENT_SYSTEM_EXECUTOR_URL: http://system-executor:19808
  OCTOAGENT_SYSTEM_EXECUTOR_TOKEN: ${OCTOAGENT_SYSTEM_EXECUTOR_TOKEN:?set OCTOAGENT_SYSTEM_EXECUTOR_TOKEN in .env}
  OCTOAGENT_HOST_REPO_ROOT: ${OCTOAGENT_HOST_REPO_ROOT:-/}
  OCTOAGENT_OPENROUTER_APP_URL: ${OCTOAGENT_OPENROUTER_APP_URL:-https://github.com/sievepub-2000/octoagent}
  OCTOAGENT_OPENROUTER_APP_TITLE: ${OCTOAGENT_OPENROUTER_APP_TITLE:-OctoAgent}
  OCTOAGENT_OPENROUTER_USAGE_INCLUDE: ${OCTOAGENT_OPENROUTER_USAGE_INCLUDE:-true}
  XDG_CACHE_HOME: /app/runtime/cache/xdg
  UV_CACHE_DIR: /app/runtime/cache/uv
  PIP_CACHE_DIR: /app/runtime/cache/pip
  PLAYWRIGHT_BROWSERS_PATH: /app/runtime/cache/ms-playwright
  HF_HOME: /app/runtime/cache/huggingface
  SENTENCE_TRANSFORMERS_HOME: /app/runtime/cache/sentence_transformers
  HF_HUB_OFFLINE: "1"
  TRANSFORMERS_OFFLINE: "1"

x-backend-volumes: &backend-volumes
  - ./runtime/config:/app/runtime/config
  - ./backend/runtime:/app/backend/runtime
  - ./workspace:/app/workspace
  - ./logs:/app/logs
  - ./tmp:/app/tmp
  - ./runtime/cache:/app/runtime/cache
  - ./runtime/logs:/app/runtime/logs
  - ./runtime/memory:/app/runtime/memory
  - ./runtime/langgraph:/app/backend/.langgraph_api
  - ./runtime/secrets:/app/runtime/secrets
  - ./runtime/system_tools:/app/runtime/system_tools
  - ./skills/custom:/app/skills/custom

services:
  postgres:
    image: ${OCTOAGENT_POSTGRES_IMAGE:-pgvector/pgvector:pg16-bookworm}
    restart: unless-stopped
    environment:
      POSTGRES_USER: octoagent
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-octoagent}
      POSTGRES_DB: ${POSTGRES_DB:-octoagent}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U octoagent -d ${POSTGRES_DB:-octoagent}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  system-executor:
    image: octoagent/backend:${OCTOAGENT_IMAGE_TAG:-local}
    restart: unless-stopped
    user: "0:0"
    command: >-
      bash -lc "cd /app/backend && /app/backend/.venv/bin/uvicorn src.system_executor.app:app --host 0.0.0.0 --port 19808"
    env_file:
      - .env.docker
    environment:
      OCTOAGENT_SYSTEM_EXECUTOR_TOKEN: ${OCTOAGENT_SYSTEM_EXECUTOR_TOKEN:?set OCTOAGENT_SYSTEM_EXECUTOR_TOKEN in .env}
      OCTOAGENT_BACKEND_IMAGE: octoagent/backend:${OCTOAGENT_IMAGE_TAG:-local}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    expose:
      - "19808"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:19808/health', timeout=5)\""]
      interval: 10s
      timeout: 6s
      retries: 12
      start_period: 10s

  app-server:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend-prod
      network: ${OCTOAGENT_BUILD_NETWORK:-default}
      args:
        PYTHON_BASE_IMAGE: ${OCTOAGENT_PYTHON_BASE_IMAGE:-python:3.12-slim}
        NODE_RUNTIME_IMAGE: ${OCTOAGENT_NODE_RUNTIME_IMAGE:-node:22-bookworm-slim}
        DOCKER_CLI_IMAGE: ${OCTOAGENT_DOCKER_CLI_IMAGE:-docker:cli}
        UV_IMAGE: ${OCTOAGENT_UV_IMAGE:-ghcr.io/astral-sh/uv:0.7.20}
        HTTP_PROXY: ${OCTOAGENT_BUILD_HTTP_PROXY:-}
        HTTPS_PROXY: ${OCTOAGENT_BUILD_HTTPS_PROXY:-}
        NO_PROXY: ${OCTOAGENT_BUILD_NO_PROXY:-}
        OCTOAGENT_UID: ${OCTOAGENT_UID:-1000}
        OCTOAGENT_GID: ${OCTOAGENT_GID:-1000}
    image: octoagent/backend:${OCTOAGENT_IMAGE_TAG:-local}
    restart: unless-stopped
    command: >-
      bash -lc "cd /app/backend && /app/backend/.venv/bin/langgraph dev --no-browser --n-jobs-per-worker ${OCTO_APP_SERVER_JOBS:-4} --host 0.0.0.0 --port ${OCTO_APP_SERVER_PORT:-19802} --no-reload"
    env_file:
      - .env.docker
    environment:
      <<: *backend-env
      OCTO_APP_SERVER_PORT: ${OCTO_APP_SERVER_PORT:-19802}
      OCTO_GATEWAY_PORT: ${OCTO_APP_SERVER_PORT:-19802}
      OCTO_LANGGRAPH_PORT: ${OCTO_APP_SERVER_PORT:-19802}
    volumes: *backend-volumes
    depends_on:
      postgres:
        condition: service_healthy
      system-executor:
        condition: service_healthy
    ports:
      - "127.0.0.1:${OCTO_APP_SERVER_PORT:-19802}:${OCTO_APP_SERVER_PORT:-19802}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:${OCTO_APP_SERVER_PORT:-19802}/health', timeout=5)\""]
      interval: 10s
      timeout: 6s
      retries: 24
      start_period: 25s

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend-prod
      network: ${OCTOAGENT_BUILD_NETWORK:-default}
      args:
        NODE_FRONTEND_IMAGE: ${OCTOAGENT_NODE_FRONTEND_IMAGE:-node:22-alpine}
        NPM_REGISTRY: ${OCTOAGENT_NPM_REGISTRY:-https://registry.npmjs.org}
        HTTP_PROXY: ${OCTOAGENT_BUILD_HTTP_PROXY:-}
        HTTPS_PROXY: ${OCTOAGENT_BUILD_HTTPS_PROXY:-}
        NO_PROXY: ${OCTOAGENT_BUILD_NO_PROXY:-}
    image: octoagent/frontend:${OCTOAGENT_IMAGE_TAG:-local}
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      OCTO_FRONTEND_PORT: ${OCTO_FRONTEND_PORT:-19806}
      NEXT_PUBLIC_BACKEND_BASE_URL: ""
      NEXT_PUBLIC_LANGGRAPH_BASE_URL: ""
      NEXT_PUBLIC_LOCAL_FRONTEND_PORT: ${OCTO_FRONTEND_PORT:-19806}
      NEXT_PUBLIC_LOCAL_GATEWAY_PORT: ${OCTO_APP_SERVER_PORT:-19802}
      NEXT_PUBLIC_LOCAL_LANGGRAPH_PORT: ${OCTO_APP_SERVER_PORT:-19802}
      NEXT_PUBLIC_LOCAL_INGRESS_PORT: ${OCTO_NGINX_PORT:-19800}
      OCTO_LANGGRAPH_BASE_URL: http://app-server:${OCTO_APP_SERVER_PORT:-19802}
      BETTER_AUTH_BASE_URL: http://localhost:${OCTO_NGINX_PORT:-19800}
    depends_on:
      app-server:
        condition: service_healthy
    ports:
      - "127.0.0.1:${OCTO_FRONTEND_PORT:-19806}:${OCTO_FRONTEND_PORT:-19806}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:${OCTO_FRONTEND_PORT:-19806}').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 6s
      retries: 24
      start_period: 20s

  nginx:
    image: ${OCTOAGENT_NGINX_IMAGE:-nginx:1.27-alpine}
    restart: unless-stopped
    ports:
      - "${OCTO_NGINX_PORT:-19800}:${OCTO_NGINX_PORT:-19800}"
    volumes:
      - ./docker/nginx/nginx.prod.conf.template:/etc/nginx/templates/nginx.conf.template:ro
    environment:
      OCTO_APP_SERVER_PORT: ${OCTO_APP_SERVER_PORT:-19802}
      OCTO_FRONTEND_PORT: ${OCTO_FRONTEND_PORT:-19806}
      OCTO_NGINX_PORT: ${OCTO_NGINX_PORT:-19800}
      NGINX_ENVSUBST_OUTPUT_DIR: /etc/nginx
    depends_on:
      frontend:
        condition: service_healthy
      app-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:${OCTO_NGINX_PORT:-19800}/health >/dev/null"]
      interval: 10s
      timeout: 6s
      retries: 24
      start_period: 10s

volumes:
  postgres-data:
