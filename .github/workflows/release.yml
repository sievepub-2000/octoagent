name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Install backend dependencies
        working-directory: backend
        run: |
          uv sync --group dev

      - name: Install frontend dependencies
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile

      - name: Verify tag matches backend and frontend versions
        shell: bash
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#v}"

          # Read the canonical compact release version (YYYYMMDD).
          BACKEND_VERSION="$(python -c \"from pathlib import Path; import tomllib; print(tomllib.loads(Path('backend/pyproject.toml').read_text(encoding='utf-8'))['project']['version'])\")"

          # The frontend must ship with the same release version.
          FRONTEND_VERSION="$(node -p \"require('./frontend/package.json').version\")"

          echo "Tag version:     $TAG_VERSION"
          echo "Backend version: $BACKEND_VERSION"
          echo "Frontend version:$FRONTEND_VERSION"

          [[ "$BACKEND_VERSION" =~ ^[0-9]{8}$ ]] || { echo "ERROR: Backend version must use YYYYMMDD"; exit 1; }
          [[ "$TAG_VERSION" == "$BACKEND_VERSION" ]] || { echo "ERROR: Tag $TAG_VERSION does not match backend version $BACKEND_VERSION"; exit 1; }
          [[ "$FRONTEND_VERSION" == "$BACKEND_VERSION" ]] || { echo "ERROR: Frontend version $FRONTEND_VERSION does not match backend version $BACKEND_VERSION"; exit 1; }

          echo "Version check passed."

      - name: Run release precheck
        run: |
          backend/.venv/bin/python backend/scripts/run_release_precheck.py --skip-smoke

      - name: Build release source archive
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME#v}"
          git archive --format=tar.gz --output "dist/octoagent-${VERSION}-source.tar.gz" HEAD
          cp CHANGELOG.md "dist/CHANGELOG-${VERSION}.md"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            dist/octoagent-*-source.tar.gz
            dist/CHANGELOG-*.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
