name: Live WebUI Smoke

on:
  workflow_dispatch:
    inputs:
      timeout_seconds:
        description: Timeout passed to make smoke-real
        required: false
        default: "60"
  schedule:
    - cron: "43 3 * * *"

permissions:
  contents: read

concurrency:
  group: live-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-real:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable Corepack
        run: corepack enable

      - name: Materialize live config
        id: live-config
        shell: bash
        env:
          OCTO_LIVE_TEST_CONFIG_YAML: ${{ secrets[format('{0}', 'OCTO_LIVE_TEST_CONFIG_YAML')] }}
        run: |
          set -euo pipefail
          if [[ -z "$OCTO_LIVE_TEST_CONFIG_YAML" ]]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            {
              echo "## Live WebUI smoke skipped"
              echo ""
              echo "No OCTO_LIVE_TEST_CONFIG_YAML secret is configured."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          printf '%s\n' "$OCTO_LIVE_TEST_CONFIG_YAML" > config.yaml
          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Install backend dependencies
        if: steps.live-config.outputs.enabled == 'true'
        working-directory: backend
        run: uv sync --group dev

      - name: Install frontend dependencies
        if: steps.live-config.outputs.enabled == 'true'
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        if: steps.live-config.outputs.enabled == 'true'
        working-directory: frontend
        run: pnpm exec playwright install --with-deps chromium

      - name: Start runtime stack
        if: steps.live-config.outputs.enabled == 'true'
        run: make dev-daemon

      - name: Run real WebUI smoke
        if: steps.live-config.outputs.enabled == 'true'
        run: make smoke-real SMOKE_TIMEOUT_SECONDS=${{ inputs.timeout_seconds || '60' }}

      - name: Stop runtime stack
        if: always() && steps.live-config.outputs.enabled == 'true'
        run: make stop

      - name: Upload smoke logs
        if: always() && steps.live-config.outputs.enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: live-smoke-logs
          path: logs/
          if-no-files-found: ignore
