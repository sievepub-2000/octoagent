name: Code Audit

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install audit tools
        run: |
          python -m pip install --upgrade pip
          pip install licensee trufflehog

      - name: License compliance check
        run: |
          licensee detect . --json || echo "License check completed"

      - name: Secret detection
        run: |
          trufflehog git file://$(pwd) --since-commit HEAD~1 || echo "Secret scan completed"