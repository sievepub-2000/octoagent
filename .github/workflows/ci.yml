name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  repo-hygiene:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify runtime state is not tracked
        shell: bash
        run: |
          set -euo pipefail
          tracked_runtime="$(git ls-files workspace | grep -E '^(workspace/default/memory\.json|workspace/env/setup\.json|workspace/runtime/|workspace/workflow/task/)' || true)"
          if [[ -n "$tracked_runtime" ]]; then
            echo "Tracked runtime state files are not allowed:"
            echo "$tracked_runtime"
            exit 1
          fi

      - name: Verify legacy runtime paths are absent
        run: python3 scripts/check_legacy_paths.py

  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync --group dev

      - name: Lint backend
        working-directory: backend
        run: make lint

      - name: Compile backend source
        working-directory: backend
        run: PYTHONPATH=. .venv/bin/python -m compileall -q src scripts

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Lint frontend
        working-directory: frontend
        run: pnpm lint

      - name: Typecheck frontend
        working-directory: frontend
        run: pnpm typecheck

      - name: Build frontend
        working-directory: frontend
        run: pnpm build

  release-precheck:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [backend, frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync --group dev

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Operator release precheck
        run: make operator-release
