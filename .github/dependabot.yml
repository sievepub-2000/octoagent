version: 2
updates:
  # Python backend - pip ecosystem
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"
    groups:
      langchain:
        patterns:
          - "langchain*"
      cryptography:
        patterns:
          - "cryptography"
          - "pyopenssl"
          - "certifi"

  # Frontend - npm/pnpm ecosystem
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "javascript"
    groups:
      nextjs:
        patterns:
          - "next"
          - "react"
          - "react-dom"
      typescript:
        patterns:
          - "typescript"
          - "@types/*"

  # Docker - docker ecosystem (backend)
  - package-ecosystem: "docker"
    directory: "/backend"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "docker"

  # Docker - docker ecosystem (frontend)
  - package-ecosystem: "docker"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "docker"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "github-actions"
