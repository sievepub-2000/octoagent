# Configuration for the OctoAgent application
#
# Guidelines:
# - Copy this file to `config.yaml` and customize it for your environment
# - The default path of this configuration file is `config.yaml` in the current working directory.
#   However you can change it using the `OCTO_AGENT_CONFIG_PATH` environment variable.
# - Environment variables are available for all field values. Example: `api_key: $OPENAI_API_KEY`
# - Preferred model config shape: choose an `interface_type`, optionally add a `provider_name`, and only set `use` when you need a custom wrapper.
# - Built-in `interface_type` values: `openai_compatible`, `anthropic_messages`, `google_genai`, `deepseek_reasoner`.
# - The `use` path still works and looks like "package_name.sub_package_name.module_name:class_name/variable_name".

# ============================================================================
# Models Configuration
# ============================================================================
# Configure available LLM models for the agent to use

