# ============================================================================
# Embedded Tiny-Model Bootstrap Runtime
# ============================================================================
# Recommended for ARM/CPU-first local deployment.
# This embeds a tiny GGUF model inside OctoAgent for:
# - first-run onboarding guidance
# - lightweight semantic retrieval
# - offline-safe startup assistance
#
# Recommended profile:
# - framework: llama_cpp
# - repo_id: lmstudio-community/gemma-3-270m-it-GGUF
# - filename: gemma-3-270m-it-Q4_K_M.gguf
#
# embedded_model:
#   project_managed: true
#   enabled: true
#   framework: llama_cpp
#   repo_id: lmstudio-community/gemma-3-270m-it-GGUF
#   filename: gemma-3-270m-it-Q4_K_M.gguf
#   cache_dir: deploy/system/bootstrap/models
#   vector_store_path: deploy/system/bootstrap/bootstrap_vectors.duckdb
#   onboarding_enabled: true
#   use_for_embeddings: true
#   auto_download: false
#   n_ctx: 8192
#   n_batch: 256
#   n_threads: 8
#   max_tokens: 256
#   temperature: 0.2
#   top_p: 0.9
#   retrieval_top_k: 4

# ============================================================================
# System Guard (Startup Self-Check / Self-Repair / Lifecycle Persistence)
# ============================================================================
# Persists startup/shutdown snapshots into a DuckDB-backed vector store,
# detects unclean shutdowns, and can ask the default agent for repair plans.
#
# system_guard:
#   enabled: true
#   auto_repair: true
#   invoke_default_agent_on_issue: false
#   startup_agent_timeout_seconds: 20
#   vector_store_path: system_guard_vectors.duckdb
#   namespace: system_lifecycle
#   register_signal_handlers: true
#   capture_atexit: true

# ============================================================================
# Checkpointer Configuration
# ============================================================================
# Configure state persistence for the embedded OctoAgentClient.
# The LangGraph Server manages its own state persistence separately
# via the server infrastructure (this setting does not affect it).
#
# When configured, OctoAgentClient will automatically use this checkpointer,
# enabling multi-turn conversations to persist across process restarts.
#
# Supported types:
#   memory   - In-process only. State is lost when the process exits. (default)
#   sqlite   - File-based SQLite persistence. Survives restarts.
#              Requires: uv add langgraph-checkpoint-sqlite
#   postgres - PostgreSQL persistence. Suitable for multi-process deployments.
#              Requires: uv add langgraph-checkpoint-postgres psycopg[binary] psycopg-pool
#
# Examples:
#
# In-memory (default when omitted — no persistence):
# checkpointer:
#   type: memory
#
# SQLite (file-based, single-process):
checkpointer:
  type: sqlite
  connection_string: checkpoints.db
#
# PostgreSQL (multi-process, production):
# checkpointer:
#   type: postgres
#   connection_string: postgresql://user:password@localhost:5432/octoagent

